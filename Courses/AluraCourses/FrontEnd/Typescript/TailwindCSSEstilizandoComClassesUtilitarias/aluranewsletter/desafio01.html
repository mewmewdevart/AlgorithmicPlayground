<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                claro: "#C5DFFF",
              },
            },
            fontFamily: {
              lobster: ["Lobster", "sans-serif"],
              poppins: ["Poppins", 'sans-serif']
            },
            keyframes: {
                        sino_kf: {
                            '0%, 100%': {
                                transform: 'rotate(-10deg)'
                            },
                            '50%': {
                                transform: 'rotate(10deg)'
                            },
                        }
                    },
                    animation: {
                        sino: 'sino_kf 0.31s ease-in-out infinite'
                    },
          },
        },
      };
    </script>
  </head>
  <body class="h-screen flex flex-col justify-center items-center">
    <header class="flex flex-col md:flex-row w-full md:w-6/12 bg-gradient-to-r from-blue-400 to-purple-400 rounded-r-xl">
        <img class="w-full md:w-6/12" src="https://cpage.sfsu.edu/sites/default/files/styles/sf_state_1440x564/public/images/codingart-laptop-news.jpg?h=93c8ae4a&itok=f172lD0h" alt="">
        <div class="pl-5 pt-5 m-auto my-10 w-full md:w-6/12 flex flex-col gap-3">
            <p class="text-3xl font-lobster text-white">Larissa</p>
            <p class="font-poppins text-white text-1xl">Desenvolvedora Front-end</p>
            <ul class="flex gap-3 group">
              <li class="text-gray-600 hover:text-white hover:font-bold cursor-pointer group-hover:animate-sino">Github</li>
              <li class="text-gray-600 hover:text-white hover:font-bold cursor-pointer group-hover:animate-sino">Linkedin</li>
              <li class="text-gray-600 hover:text-white hover:font-bold cursor-pointer group-hover:animate-sino">Email</li>
            </ul>
        </div>
    </header>
</body>
</html>
