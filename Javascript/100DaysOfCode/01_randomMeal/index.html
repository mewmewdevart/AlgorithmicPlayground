<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>01 - Random Food Generator</title>

	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header>
		<h1>Feeling hungry?</h1>
		<button onclick="generatefood()">Random food <span id="foodIcon">🍖</span></button>
	</header>

	<section id="foodSection">
		<main>
			<img id="imageFood" src="" alt="imagem">
			<article>
				<h2 id="foodName">food Name</h2>
				<p id="instructions">Instructions: <span>Instructions</span></p>
			</article>
		</main>

		<div class="list">
			<h3>Category:</h3>
			<ul id="categoryList">
				<li id="type">Type: </li>
				<li id="country">Contry: </li>
				<li id="tags">Tags: </li>
			</ul>
		</div>

		<div class="list">
			<h4>Ingredients:</h4>
			<ul id="IngredientsList">
			</ul>
		</div>

		<div class="tutorialYoutube">
			<h5>Tutorial Video: </h5>
			<div class="youtube">
			</div>
		</div>
	</section>
	<footer>
		<p>Developed by <a target="_blank" href="https://linktr.ee/mewmewdevart">@Mewmew</a></p>
	</footer>
	<script src="script.js"></script>
</body>
</html>
